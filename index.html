<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GetKeyFree · Ducanh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e14;
            color: #00ffc8;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #131a22;
            padding: 2rem 2.5rem;
            border: 1px solid #00ffc8;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.15);
            max-width: 600px;
            width: 100%;
        }
        .status {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px dashed #2a3a44;
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .status span { color: #88b8b0; }
        .status .highlight { color: #00ffc8; font-weight: bold; }
        .title {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 12px #00ffc8;
            margin: 0.25rem 0;
        }
        .sub {
            color: #7a9a92;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #1f2e36;
            padding-bottom: 1rem;
        }
        .sys {
            background: #0e151d;
            padding: 0.6rem;
            border-radius: 6px;
            display: flex;
            justify-content: space-around;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border: 1px solid #1f313a;
        }
        .sys .ping-value {
            color: #00ffc8;
            font-weight: bold;
        }
        .license-box {
            background: #0b1118;
            padding: 1rem;
            border: 1px solid #00c8a0;
            border-radius: 8px;
            margin: 1.5rem 0;
        }
        .license-box input {
            background: transparent;
            border: none;
            color: #00ffc8;
            font-size: 1.4rem;
            font-family: 'Courier New', monospace;
            text-align: center;
            width: 100%;
            outline: none;
            letter-spacing: 3px;
        }
        .license-box input::placeholder {
            color: #2a4a4a;
            letter-spacing: 1px;
            font-size: 1rem;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
            margin: 1.8rem 0 1rem;
        }
        .btn {
            background: #0e1a20;
            border: 1px solid #00c8a0;
            color: #00ffc8;
            padding: 0.6rem 1.6rem;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 30px;
            letter-spacing: 2px;
            font-size: 0.75rem;
            background: transparent;
        }
        .btn:hover {
            background: #00ffc8;
            color: #0a0e14;
            box-shadow: 0 0 24px #00ffc8;
        }
        .btn-danger {
            border-color: #ff5577;
            color: #ff5577;
        }
        .btn-danger:hover {
            background: #ff5577;
            color: #0a0e14;
            box-shadow: 0 0 24px #ff5577;
        }
        .btn-vip {
            border-color: #ffaa00;
            color: #ffaa00;
        }
        .btn-vip:hover {
            background: #ffaa00;
            color: #0a0e14;
            box-shadow: 0 0 24px #ffaa00;
        }
        .footer {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #3a5a5a;
            border-top: 1px solid #1a2a2a;
            padding-top: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }
        .footer span { cursor: pointer; }
        .footer span:hover { color: #00ffc8; text-shadow: 0 0 8px #00ffc8; }
        #keyDisplay {
            background: #0b1118;
            padding: 0.5rem;
            border-radius: 6px;
            margin: 0.5rem 0;
            font-size: 1.1rem;
            letter-spacing: 2px;
            min-height: 2.8rem;
            color: #aaffdd;
            border: 1px dashed #1f3a3a;
        }
        .note {
            font-size: 0.65rem;
            color: #3f6a6a;
            margin-top: 0.8rem;
        }
        .vip-badge {
            color: #ffaa00;
            font-weight: bold;
            text-shadow: 0 0 10px #ffaa00;
        }
        /* Popup trạng thái */
        .status-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #131a22;
            padding: 2rem 3rem;
            border: 2px solid #ffaa00;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(255, 170, 0, 0.3);
            z-index: 9999;
            display: none;
            text-align: center;
            min-width: 300px;
        }
        .status-popup .spinner {
            border: 4px solid #1f2e36;
            border-top: 4px solid #ffaa00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-popup p { color: #aaffdd; font-size: 1rem; }
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 9998;
            display: none;
        }
    </style>
</head>
<body>
<!-- Popup trạng thái -->
<div class="overlay" id="overlay"></div>
<div class="status-popup" id="statusPopup">
    <div class="spinner"></div>
    <p id="popupText">Đang chuyển hướng qua link4sub...</p>
</div>

<div class="container" id="app">
    <div class="status">
        <span>🔒 GetKeyFree <span class="highlight">●</span></span>
        <span>By Ducanh</span>
    </div>
    <div class="title">GetKey</div>
    <div class="sub">HỆ THỐNG: MƯỢT MÀ</div>
    <div class="sys">
        <span>PING: <span class="ping-value" id="pingDisplay">--</span>ms</span>
        <span>ONLINE: 121</span>
    </div>

    <div style="text-align: left; font-size: 0.8rem; color: #7a9a92; margin-bottom: 0.2rem;">DÁN KEY VÀO Ô ĐỂ TIẾN HÀNH</div>
    <div class="license-box">
        <input type="text" id="licenseInput" placeholder="Paste Key" value="">
    </div>

    <div class="btn-group">
        <button class="btn" id="confirmBtn">XÁC NHẬN TIẾN HÀNH</button>
        <button class="btn btn-danger" id="getKeyBtn">GET KEY FREE</button>
        <button class="btn btn-vip" id="vipKeyBtn">⚡ GET KEY VIP (link4sub)</button>
    </div>

    <div id="keyDisplay">▶ DÁN KEY HOẶC BẤM GET KEY</div>
    <div class="footer">
        <span id="solitudeTrigger">Mua Key Vip Ib Zalo : 0325976017</span>
    </div>
    <div class="note">* Key thường: <span class="vip-badge">Ducanh-XXXX-XXXX</span> · Key VIP: <span class="vip-badge">Ducanh-VIP-XXXX</span></div>
</div>

<script>
    (function() {
        // === PING REAL ===
        function measurePing() {
            const start = performance.now();
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(() => {
                    const end = performance.now();
                    const ping = Math.round(end - start);
                    document.getElementById('pingDisplay').textContent = ping;
                })
                .catch(() => {
                    document.getElementById('pingDisplay').textContent = '--';
                });
        }
        measurePing();
        setInterval(measurePing, 5000);

        // === GENERATE KEY FREE (thường) ===
        function generateKey() {
            const chars = '0123456789';
            let seg1 = '', seg2 = '';
            for (let i = 0; i < 4; i++) {
                seg1 += chars.charAt(Math.floor(Math.random() * chars.length));
                seg2 += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return 'Ducanh-' + seg1 + '-' + seg2;
        }

        function generateVipKey() {
            const chars = '0123456789';
            let seg = '';
            for (let i = 0; i < 4; i++) {
                seg += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return 'Ducanh-VIP-' + seg;
        }

        const licenseInput = document.getElementById('licenseInput');
        const confirmBtn = document.getElementById('confirmBtn');
        const getKeyBtn = document.getElementById('getKeyBtn');
        const vipKeyBtn = document.getElementById('vipKeyBtn');
        const keyDisplay = document.getElementById('keyDisplay');
        const solitudeTrigger = document.getElementById('solitudeTrigger');
        const overlay = document.getElementById('overlay');
        const popup = document.getElementById('statusPopup');
        const popupText = document.getElementById('popupText');

        function showPopup(msg) {
            popupText.textContent = msg;
            overlay.style.display = 'block';
            popup.style.display = 'block';
        }

        function hidePopup() {
            overlay.style.display = 'none';
            popup.style.display = 'none';
        }

        // === XÁC NHẬN ===
        confirmBtn.addEventListener('click', function() {
            let currentKey = licenseInput.value.trim();
            if (currentKey === '') {
                keyDisplay.textContent = '⚠ LỖI: KEY TRỐNG';
                keyDisplay.style.color = '#ff5577';
                keyDisplay.style.textShadow = 'none';
                return;
            }

            const regexNormal = /^Ducanh-[0-9]{4}-[0-9]{4}$/;
            const regexVip = /^Ducanh-VIP-[0-9]{4}$/;

            if (regexVip.test(currentKey)) {
                keyDisplay.textContent = '👑 XÁC NHẬN VIP THÀNH CÔNG · KEY: ' + currentKey;
                keyDisplay.style.color = '#ffaa00';
                keyDisplay.style.textShadow = '0 0 20px #ffaa00';
            } else if (regexNormal.test(currentKey)) {
                keyDisplay.textContent = '✅ XÁC NHẬN THÀNH CÔNG · KEY: ' + currentKey;
                keyDisplay.style.color = '#00ffc8';
                keyDisplay.style.textShadow = 'none';
            } else {
                keyDisplay.textContent = '❌ KEY KHÔNG HỢP LỆ';
                keyDisplay.style.color = '#ff5577';
                keyDisplay.style.textShadow = 'none';
            }
        });

        // === GET KEY FREE (sinh key thường) ===
        getKeyBtn.addEventListener('click', function() {
            const newKey = generateKey();
            licenseInput.value = newKey;
            keyDisplay.textContent = '🆓 KEY FREE: ' + newKey;
            keyDisplay.style.color = '#aaffdd';
            keyDisplay.style.textShadow = 'none';
        });

        // === GET KEY VIP (link4sub) ===
        vipKeyBtn.addEventListener('click', function() {
            // Hiện popup thông báo chuyển hướng
            showPopup('⏳ Đang chuyển hướng qua link4sub... Vui lòng hoàn thành 2 bước để nhận key VIP');

            // Mở link4sub trong tab mới (vì hầu hết trình duyệt chặn popup)
            // Đồng thời lưu thời điểm bắt đầu
            const startTime = Date.now();
            window.open('https://link4sub.com/oWpbbpgDoM', '_blank');

            // Đóng popup sau 3 giây và hướng dẫn quay lại
            setTimeout(function() {
                hidePopup();
                keyDisplay.textContent = '📌 Đã mở link4sub trong tab mới. Sau khi hoàn thành 2 bước, quay lại trang này và key VIP sẽ tự động được điền.';
                keyDisplay.style.color = '#ffaa44';
                keyDisplay.style.textShadow = 'none';

                // Mô phỏng nhận key từ link4sub sau 15 giây (thời gian trung bình hoàn thành)
                // Trong thực tế, cần có cơ chế callback từ link4sub, nhưng link4sub không hỗ trợ
                // Nên ta dùng cơ chế giả lập: tự sinh key VIP sau khi người dùng quay lại
                let checkInterval = setInterval(function() {
                    // Kiểm tra nếu tab đang được focus lại (người dùng đã quay lại)
                    if (document.hasFocus()) {
                        // Tạo key VIP ngẫu nhiên
                        const vipKey = generateVipKey();
                        licenseInput.value = vipKey;
                        keyDisplay.textContent = '👑 KEY VIP TỪ link4sub: ' + vipKey + ' (đã tự động điền)';
                        keyDisplay.style.color = '#ffaa00';
                        keyDisplay.style.textShadow = '0 0 20px #ffaa00';
                        clearInterval(checkInterval);
                    }
                }, 3000); // Kiểm tra mỗi 3 giây

                // Dừng kiểm tra sau 60 giây để tránh treo
                setTimeout(function() {
                    clearInterval(checkInterval);
                }, 60000);
            }, 3000);
        });

        // === MUA KEY VIP ===
        solitudeTrigger.addEventListener('click', function() {
            const sampleVip = generateVipKey();
            keyDisplay.textContent = '📞 LIÊN HỆ ZALO : 0325976017 ĐỂ MUA KEY VIP · Ví dụ: ' + sampleVip;
            keyDisplay.style.color = '#ffaa44';
            keyDisplay.style.textShadow = 'none';
        });

        // === INIT ===
        window.addEventListener('load', function() {
            keyDisplay.textContent = '▶ DÁN KEY HOẶC BẤM GET KEY';
            keyDisplay.style.color = '#7a9a92';
            keyDisplay.style.textShadow = 'none';
        });

        // Bắt sự kiện khi người dùng quay lại tab (từ link4sub)
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // Nếu ô key đang trống hoặc chưa có key VIP, tự sinh key VIP
                const currentKey = licenseInput.value.trim();
                if (currentKey === '' || !currentKey.startsWith('Ducanh-VIP-')) {
                    const vipKey = generateVipKey();
                    licenseInput.value = vipKey;
                    keyDisplay.textContent = '👑 KEY VIP TỪ link4sub: ' + vipKey + ' (tự động điền khi quay lại)';
                    keyDisplay.style.color = '#ffaa00';
                    keyDisplay.style.textShadow = '0 0 20px #ffaa00';
                }
            }
        });
    })();
</script>
</body>
</html>
